name: Supabase keep-alive

# Free Supabase projects pause after ~7 days with no activity. This makes a
# real DB read twice a week so the project stays awake over quiet periods
# (e.g. semester breaks). The key below is the public "publishable" key — the
# same one shipped in the web app — so it is safe to commit.

on:
  schedule:
    - cron: '17 6 * * 1,4' # 06:17 UTC, Mondays and Thursdays
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Read health row
        run: |
          curl --fail --silent --show-error \
            "https://lyfzjsgverchjdjgvnfv.supabase.co/rest/v1/health?select=id&limit=1" \
            -H "apikey: sb_publishable_0N6WuqphTZ5CiYxBSCAKjQ_08409kpa" \
            -H "Authorization: Bearer sb_publishable_0N6WuqphTZ5CiYxBSCAKjQ_08409kpa" \
            -o /dev/null
